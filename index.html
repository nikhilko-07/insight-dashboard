<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insight.IO | Remote Control Car</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>
    <div class="dashboard">
        <!-- Top Status Bar -->
        <div class="status-bar">
            <div class="status-left">
                <span class="mission-name">Status On Mission 1234</span>
            </div>
            <div class="status-right">
                <span class="battery">100%</span>
                <span class="separator">|</span>
                <span class="strong">Strong</span>
                <span class="separator">|</span>
                <span class="failsafe">Failsafe</span>
                <span class="ok-badge">Okay</span>
                <span class="separator">|</span>
                <span class="system">System</span>
                <span class="ok-badge">Okay</span>
            </div>
        </div>

        <!-- Main Grid -->
        <div class="main-grid">
            <!-- Left Panel - QUICK GOAL -->
            <div class="left-panel">
                <div class="quick-goal-box">
                    <div class="quick-goal-title">QUICK GOAL</div>
                    <div class="quick-goal-value">15</div>
                </div>
            </div>

            <!-- Center Panel - Views Container -->
            <div class="center-panel" id="centerPanel">
                <!-- Main View (बड़ा) - Default Map -->
                <div class="view-main" id="viewMain">
                    <div class="view-header">
                        <span id="mainTitle"><i class="fas fa-map"></i> Map View</span>
                        <span class="view-badge" id="mainBadge">MAIN</span>
                    </div>
                    <div id="mainCanvas" class="view-content"></div>
                </div>

                <!-- Pip View (छोटा) - Default Camera -->
                <div class="view-pip" id="viewPip">
                    <div class="pip-header">
                        <span id="pipTitle"><i class="fas fa-video"></i> Camera View</span>
                        <span class="live-badge">LIVE</span>
                    </div>
                    <div class="pip-content">
                        <video id="cameraFeed" autoplay playsinline></video>
                        <div class="pip-placeholder" id="cameraPlaceholder">
                            <i class="fas fa-camera"></i>
                            <span>Camera starting...</span>
                        </div>
                        <div class="pip-overlay">
                            <span class="recording-dot"></span>
                            <span class="pip-time" id="cameraTime"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Panel - Controls -->
            <div class="right-panel">
                <!-- MODE Section -->
                <div class="mode-section">
                    <div class="mode-title">MODE</div>
                    <div class="mode-buttons">
                        <button class="mode-btn active" data-mode="auto">AUTO</button>
                        <button class="mode-btn" data-mode="manual">MANUAL</button>
                    </div>
                </div>

                <!-- Drive Controls -->
                <div class="drive-controls">
                    <div class="control-row">
                        <button class="control-btn" id="forwardBtn">
                            <i class="fas fa-arrow-up"></i>
                        </button>
                    </div>
                    <div class="control-row">
                        <button class="control-btn" id="leftBtn">
                            <i class="fas fa-arrow-left"></i>
                        </button>
                        <button class="control-btn stop-btn" id="stopBtn">STOP</button>
                        <button class="control-btn" id="rightBtn">
                            <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                    <div class="control-row">
                        <button class="control-btn" id="backwardBtn">
                            <i class="fas fa-arrow-down"></i>
                        </button>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button class="action-btn initiate" id="initiateBtn">
                        <i class="fas fa-play"></i> INITIATE
                    </button>
                    <button class="action-btn emergency" id="emergencyBtn">
                        <i class="fas fa-exclamation-triangle"></i> EMERGENCY
                    </button>
                </div>

                <!-- Camera Controls -->
                <div class="camera-controls">
                    <button class="camera-btn" id="snapshotBtn">
                        <i class="fas fa-camera"></i> Snapshot
                    </button>
                    <button class="camera-btn" id="toggleCameraBtn">
                        <i class="fas fa-sync"></i> Switch Cam
                    </button>
                </div>

                <!-- Swap Hint -->
                <div class="swap-hint">
                    <i class="fas fa-exchange-alt"></i>
                    <span>Click on any view to swap</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
